services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: cmip-db
    environment:
      - POSTGRES_USER=cmip
      - POSTGRES_PASSWORD=cmip
      - POSTGRES_DB=cmip
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmip"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cmip-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: cmip-kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cmip-kafka-ui
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy

  app:
    build:
      context: ..
      dockerfile: Dockerfile.dev
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: cmip-app
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ../.env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      COLLECTOR_MODE: mock
      SYMBOLS: BTCUSDT
      MOCK_TRADE_INTERVAL_MS: 1000
      BINANCE_WS_URL: wss://stream.binance.com:9443
      KAFKA_BROKERS: kafka:9092
      POSTGRES_URL: postgresql://cmip:cmip@timescaledb:5432/cmip
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
      - "9230:9229"
    volumes:
      - ../src:/app/src
      - ../tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescale_data:
  redis_data:
  kafka_data:

networks:
  default:
    name: cmip-network
